version: '3.8'

services:
  app:
    build: .
    container_name: tech_challenge_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  mongo:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
